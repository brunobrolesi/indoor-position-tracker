services:
  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: indoor-mqtt-broker
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mqtt/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

  mqtt-client:
    build:
      context: ./docker/mqtt/client
    container_name: indoor-mqtt-client
    depends_on:
      - mqtt-broker
    profiles:
      - tools
    environment:
      MQTT_HOST: mqtt-broker
      MQTT_PORT: "1883"
      MQTT_TOPIC: "indoor/#"
    command:
      - sh
      - -lc
      - mosquitto_sub -h "$$MQTT_HOST" -p "$$MQTT_PORT" -t "$$MQTT_TOPIC" -v

volumes:
  mqtt_data:
  mqtt_log:
